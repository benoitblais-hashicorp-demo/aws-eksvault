<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Secrets Operator Demo</title>
    <link rel="icon" type="image/x-icon" href="/resources/favicon.ico">
    <style>
        @font-face {
            font-family: 'HashiCorp Sans Light';
            src: url('/resources/HashiCorp_Sans_Light.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'HashiCorp Sans';
            src: url('/resources/HashiCorp_Sans_Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        *,
        *:before,
        *:after {
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'HashiCorp Sans', sans-serif;
            background-image: linear-gradient(45deg, #1D1E1F, #343536);
            height: 100%;
            padding: 10px;
        }

        a {
            color: #EE4B5E !important;
            text-decoration: none;
        }

        a:hover {
            color: #FFFFFF !important;
            text-decoration: none;
        }

        .text-wrapper {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 5em;
            font-weight: 700;
            color: #EE4B5E;
        }

        .subtitle {
            font-size: 30px;
            text-align: center;
            font-weight: 700;
            color: #ffffff;
        }

        .subtitle-2 {
            font-size: 20px;
            text-align: center;
            font-weight: 700;
            color: #ffffff;
        }

        .isi {
            font-family: 'HashiCorp Sans Light', sans-serif;
            position: absolute;
            bottom: 0;
            font-size: 18px;
            text-align: center;
            margin: 30px;
            padding: 20px;
            color: white;
        }

        .buttons {
            margin: 30px;
            font-weight: 700;
            border: 2px solid #EE4B5E;
            text-decoration: none;
            padding: 15px;
            text-transform: uppercase;
            color: #EE4B5E;
            border-radius: 26px;
            transition: all 0.2s ease-in-out;
            display: inline-block;

            .buttons:hover {
                background-color: #EE4B5E;
                color: white;
                transition: all 0.2s ease-in-out;
            }
        }
    </style>

    <script language="JavaScript">
        function send(form) {
        }
    </script>

</head>

<body>
    <div class="text-wrapper">
        <div class="title" data-content="404">
            <img src="{{ .CentralImage }}" alt="HashiCorp" style="width: 300px;">
        </div>

        <div class="subtitle">
            {{ .Title }}<br />
            <div class="subtitle-2">{{ .SubTitle }}<br /><br />
            </div>
            {{ .FirstMessage }}
        </div>
        <div class="isi">
            Learn more <a href="{{ .LearnMoreURL }}" target="_blank">here</a><br /><br />
            Made with <img src="/resources/heart.png" alt="HashiCorp" style="width: 18px;"> by Value Engineering
        </div>
    </div>
</body>

</html>

</html>
